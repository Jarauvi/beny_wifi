start_charging:
  name: "Start Charging"
  description: "Start charging."
  fields:
    device_id:
      required: true
      selector:
        device:
          integration: beny_wifi

stop_charging:
  name: "Stop Charging"
  description: "Stop charging."
  fields:
    device_id:
      required: true
      selector:
        device:
          integration: beny_wifi

set_timer:
  name: "Set Timer"
  description: "Sets charging timer."
  fields:
    device_id:
      required: true
      selector:
        device:
          integration: beny_wifi
    start_time:
      required: true
      selector:
        time: {}
    end_time:
      required: false
      selector:
        time: {}

reset_timer:
  name: "Reset Timer"
  description: "Resets charging timer."
  fields:
    device_id:
      required: true
      selector:
        device:
          integration: beny_wifi

set_weekly_schedule:
  name: "Set Weekly Schedule"
  description: "Sets weekly schedule."
  fields:
    device_id:
      required: true
      selector:
        device:
          integration: beny_wifi
    sunday:
      required: true
      selector:
        boolean: {}
    monday:
      required: true
      selector:
        boolean: {}
    tuesday:
      required: true
      selector:
        boolean: {}
    wednesday:
      required: true
      selector:
        boolean: {}
    thursday:
      required: true
      selector:
        boolean: {}
    friday:
      required: true
      selector:
        boolean: {}
    saturday:
      required: true
      selector:
        boolean: {}
    start_time:
      required: true
      selector:
        time: {}
    end_time:
      required: true
      selector:
        time: {}

request_weekly_schedule:
  name: "Request Weekly Schedule"
  description: "Returns weekly schedule if set."
  fields:
    device_id:
      required: true
      selector:
        device:
          integration: beny_wifi

set_maximum_monthly_consumption:
  name: "Set Maximum Monthly Consumption"
  description: "Limits maximum energy consumption on a monthly basis."
  fields:
    device_id:
      required: true
      selector:
        device:
          integration: beny_wifi
    maximum_consumption:
      required: true
      selector:
        number:
          min: 0
          max: 65535
          step: 1
          unit_of_measurement: "kWh"
          mode: box

set_maximum_session_consumption:
  name: "Set Maximum Session Consumption"
  description: "Limits maximum energy consumption on a session basis."
  fields:
    device_id:
      required: true
      selector:
        device:
          integration: beny_wifi
    maximum_consumption:
      required: true
      selector:
        number:
          min: 0
          max: 256
          step: 1
          unit_of_measurement: "kWh"
          mode: box

set_max_current:
  name: "Set Max Current"
  description: "Set the maximum charging current in amps."
  fields:
    device_id:
      required: true
      selector:
        device:
          integration: beny_wifi
    max_current:
      name: "Max Current"
      description: "Current limit between 6A and 32A."
      required: true
      example: 16
      selector:
        number:
          min: 6
          max: 32
          mode: slider

set_dlb_config:
  name: "Set DLB Config"
  description: >
    Configure the DLB (Dynamic Load Balancing) operating mode and associated options.
    All fields are optional — only supplied fields are changed. The charger always
    receives the full config, with unchanged fields preserved from the last known state.
    Only available on DLB-capable chargers.
  fields:
    device_id:
      required: true
      selector:
        device:
          integration: beny_wifi
    dlb_mode:
      name: "DLB Mode"
      description: "Primary DLB operating mode."
      required: false
      example: "hybrid"
      selector:
        select:
          options:
            - label: "DLB Box (hardware controls current)"
              value: "dlb_box"
            - label: "Full Speed (no grid limiting)"
              value: "full_speed"
            - label: "Hybrid (grid allowed, with current limit)"
              value: "hybrid"
            - label: "Pure PV (solar only)"
              value: "pure_pv"
    hybrid_current:
      name: "Hybrid Current Limit"
      description: "Current limit in amps when DLB Mode is set to Hybrid (6–32A)."
      required: false
      example: 16
      selector:
        number:
          min: 6
          max: 32
          step: 1
          unit_of_measurement: "A"
          mode: slider
    extreme_mode:
      name: "Extreme Mode"
      description: >
        When enabled, the charger reduces current as home load rises and stops
        charging if grid headroom drops below ~10A.
      required: false
      selector:
        boolean: {}
    night_mode:
      name: "Night Mode"
      description: "Enable automatic full-speed charging during a configured nightly window."
      required: false
      selector:
        boolean: {}
    night_start:
      name: "Night Mode Start Hour"
      description: "Hour to begin Night Mode (0–23, 24h clock). Example: 22 = 10pm."
      required: false
      example: 22
      selector:
        number:
          min: 0
          max: 23
          step: 1
          mode: box
    night_end:
      name: "Night Mode End Hour"
      description: "Hour to end Night Mode (0–23, 24h clock). Example: 6 = 6am."
      required: false
      example: 6
      selector:
        number:
          min: 0
          max: 23
          step: 1
          mode: box